<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP4 - Bloc1 Programmation Web</title>
    <link rel="stylesheet" href="Style/style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        header {
            background-color: #1e3a8a;
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        main {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .intro {
            text-align: center;
            margin-bottom: 50px;
        }

        .sommaire {
            text-align: center;
        }

        .cours-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .cours {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            width: 200px;
            transition: transform 0.3s ease;
        }

        .cours:hover {
            transform: translateY(-5px);
        }

        .cours a {
            text-decoration: none;
            color: black;
        }

        .cours img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            display: block;
            margin: 0 auto 15px auto;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #1e3a8a;
            color: white;
            margin-top: 50px;
        }

        footer a {
            color: white;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header>
    <h1>Bloc 1 - Programmation Web</h1>
    <p>Les bases du HTML, CSS et JavaScript</p>
</header>

<main>

    <section class="intro">
        <h2>Description du cours</h2>
        <p>
            Ce module présente les bases du développement Web :
            HTML pour la structure,
            CSS pour le style,
            JavaScript pour l'interactivité.
        </p>
    </section>

    <section class="sommaire">
        <h2>Sommaire</h2>

        <div class="cours-container">

            <div class="cours">
                <a href="Docs/coursHTML.html">
                    <img src="Image/logo_html.png" alt="HTML">
                    <h3>1 - HTML</h3>
                </a>
            </div>

            <div class="cours">
                <a href="Docs/coursCSS.html">
                    <img src="Image/logo_css.png" alt="CSS">
                    <h3>2 - CSS</h3>
                </a>
            </div>

            <div class="cours">
                <a href="Docs/coursJS.html">
                    <img src="Image/logo_js.png" alt="JavaScript">
                    <h3>3 - JavaScript</h3>
                </a>
            </div>

        </div>

    </section>

</main>

<footer>
    <a href="../index.html">⬅ Retour au site principal</a>
</footer>

</html>
