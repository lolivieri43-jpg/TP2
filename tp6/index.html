<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TP6 - Memory 5x4</title>
    <style>
        :root {
            --card-width: 100px;
            --card-height: 140px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* Grille 5x4 */
        .memory-game {
            width: 600px; /* 5 colonnes de 100px + marges */
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            perspective: 1000px;
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        /* État retourné */
        .card.flip {
            transform: rotateY(180deg);
        }

        .front-face, .back-face {
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 8px;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #ecf0f1;
        }

        /* Face avec l'image (cachée au début) */
        .front-face {
            background-color: #fff;
            transform: rotateY(180deg);
        }

        .front-face img {
            max-width: 90%;
            max-height: 90%;
        }

        /* Dos de la carte (visible au début) */
        .back-face {
            background-color: #3498db;
            font-size: 2rem;
            font-weight: bold;
        }

        .back-face::after {
            content: "?";
        }
    </style>
</head>
<body>

<header>
    <h1>Memory (5 x 4)</h1>
    <p>Trouvez les paires ! Les cartes restent 5 secondes si elles sont différentes.</p>
</header>

<main class="memory-game" id="game-board">
    <div class="card" data-id="1"><div class="front-face"><img src="assets/images/img1.png" alt="1"></div><div class="back-face"></div></div>
    <div class="card" data-id="1"><div class="front-face"><img src="assets/images/img1.png" alt="1"></div><div class="back-face"></div></div>
    <div class="card" data-id="2"><div class="front-face"><img src="assets/images/img2.png" alt="2"></div><div class="back-face"></div></div>
    <div class="card" data-id="2"><div class="front-face"><img src="assets/images/img2.png" alt="2"></div><div class="back-face"></div></div>
    <div class="card" data-id="3"><div class="front-face"><img src="assets/images/img3.png" alt="3"></div><div class="back-face"></div></div>
    <div class="card" data-id="3"><div class="front-face"><img src="assets/images/img3.png" alt="3"></div><div class="back-face"></div></div>
    <div class="card" data-id="4"><div class="front-face"><img src="assets/images/img4.png" alt="4"></div><div class="back-face"></div></div>
    <div class="card" data-id="4"><div class="front-face"><img src="assets/images/img4.png" alt="4"></div><div class="back-face"></div></div>
    <div class="card" data-id="5"><div class="front-face"><img src="assets/images/img5.png" alt="5"></div><div class="back-face"></div></div>
    <div class="card" data-id="5"><div class="front-face"><img src="assets/images/img5.png" alt="5"></div><div class="back-face"></div></div>
    <div class="card" data-id="6"><div class="front-face"><img src="assets/images/img6.png" alt="6"></div><div class="back-face"></div></div>
    <div class="card" data-id="6"><div class="front-face"><img src="assets/images/img6.png" alt="6"></div><div class="back-face"></div></div>
    <div class="card" data-id="7"><div class="front-face"><img src="assets/images/img7.png" alt="7"></div><div class="back-face"></div></div>
    <div class="card" data-id="7"><div class="front-face"><img src="assets/images/img7.png" alt="7"></div><div class="back-face"></div></div>
    <div class="card" data-id="8"><div class="front-face"><img src="assets/images/img8.png" alt="8"></div><div class="back-face"></div></div>
    <div class="card" data-id="8"><div class="front-face"><img src="assets/images/img8.png" alt="8"></div><div class="back-face"></div></div>
    <div class="card" data-id="9"><div class="front-face"><img src="assets/images/img9.png" alt="9"></div><div class="back-face"></div></div>
    <div class="card" data-id="9"><div class="front-face"><img src="assets/images/img9.png" alt="9"></div><div class="back-face"></div></div>
    <div class="card" data-id="10"><div class="front-face"><img src="assets/images/img10.png" alt="10"></div><div class="back-face"></div></div>
    <div class="card" data-id="10"><div class="front-face"><img src="assets/images/img10.png" alt="10"></div><div class="back-face"></div></div>
</main>

<script>
    const cards = document.querySelectorAll('.card');
    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;

    function flipCard() {
        if (lockBoard) return; 
        if (this === firstCard) return;

        this.classList.add('flip');

        if (!hasFlippedCard) {
            hasFlippedCard = true;
            firstCard = this;
            return;
        }

        secondCard = this;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.id === secondCard.dataset.id;
        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;
        // TEMPS DE VISIBILITÉ : 5 secondes (5000ms)
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 5000); 
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }

    // Mélange les cartes au chargement
    (function shuffle() {
        cards.forEach(card => {
            let randomPos = Math.floor(Math.random() * 20);
            card.style.order = randomPos;
        });
    })();

    cards.forEach(card => card.addEventListener('click', flipCard));
</script>

</body>
</html>
