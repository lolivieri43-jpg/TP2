<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP6 - Memory Fruits</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #243447, #111827);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 25px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      margin-bottom: 8px;
      font-size: 32px;
    }

    .info {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    .badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
    }

    .actions {
      margin-bottom: 20px;
    }

    button {
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    button:hover {
      background: #16a34a;
      transform: translateY(-1px);
    }

    .memory-game {
      width: min(95vw, 760px);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      perspective: 1000px;
    }

    .card {
      height: 135px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
      cursor: pointer;
      border-radius: 12px;
    }

    .card.flip {
      transform: rotateY(180deg);
    }

    .card.matched {
      cursor: default;
      filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.8));
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.85);
      user-select: none;
    }

    .front {
      background: white;
      transform: rotateY(180deg);
    }

    .front canvas {
      width: 92%;
      height: 92%;
      object-fit: contain;
      pointer-events: none;
    }

    .back {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      font-size: 42px;
      font-weight: bold;
      color: white;
    }

    .back::before {
      content: "?";
    }

    .message {
      margin-top: 18px;
      min-height: 28px;
      font-size: 20px;
      font-weight: bold;
      color: #86efac;
    }

    @media (max-width: 700px) {
      .memory-game {
        grid-template-columns: repeat(4, 1fr);
      }

      .card {
        height: 110px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>TP6 - Jeu des paires</h1>
  <p>Trouve toutes les paires de fruits. Les mauvaises paires se retournent automatiquement.</p>
</header>

<section class="info">
  <div class="badge">Coups : <span id="moves">0</span></div>
  <div class="badge">Paires : <span id="pairs">0</span>/10</div>
  <div class="badge">Temps : <span id="timer">0</span>s</div>
</section>

<div class="actions">
  <button id="restart">Recommencer</button>
</div>

<main class="memory-game" id="game"></main>

<div class="message" id="message"></div>

const game = document.getElementById("game");
const movesDisplay = document.getElementById("moves");
const pairsDisplay = document.getElementById("pairs");
const timerDisplay = document.getElementById("timer");
const message = document.getElementById("message");
const restartBtn = document.getElementById("restart");

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let moves = 0;
let pairs = 0;
let seconds = 0;
let timer = null;
let gameStarted = false;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startTimer() {
  if (gameStarted) return;
  gameStarted = true;

  timer = setInterval(() => {
    seconds++;
    timerDisplay.textContent = seconds;
  }, 1000);
}

function drawImageInCanvas(canvas, imageData) {
  const ctx = canvas.getContext("2d");
  const img = new Image();

  img.onload = function () {
    canvas.width = 220;
    canvas.height = 220;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
    const width = img.width * ratio;
    const height = img.height * ratio;
    const x = (canvas.width - width) / 2;
    const y = (canvas.height - height) / 2;

    ctx.drawImage(img, x, y, width, height);
  };

  img.src = imageData;
}

function createCard(item) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.id = item.id;

  const front = document.createElement("div");
  front.className = "face front";

  const canvas = document.createElement("canvas");
  drawImageInCanvas(canvas, item.data);

  front.appendChild(canvas);

  const back = document.createElement("div");
  back.className = "face back";

  card.appendChild(front);
  card.appendChild(back);

  card.addEventListener("click", flipCard);

  return card;
}

function initGame() {
  clearInterval(timer);

  firstCard = null;
  secondCard = null;
  lockBoard = false;
  moves = 0;
  pairs = 0;
  seconds = 0;
  gameStarted = false;

  movesDisplay.textContent = moves;
  pairsDisplay.textContent = pairs;
  timerDisplay.textContent = seconds;
  message.textContent = "";

  game.innerHTML = "";

  const cards = shuffle([...IMAGE_BANK, ...IMAGE_BANK]);

  cards.forEach(item => {
    game.appendChild(createCard(item));
  });
}

function flipCard() {
  if (lockBoard) return;
  if (this.classList.contains("flip")) return;
  if (this.classList.contains("matched")) return;

  startTimer();

  this.classList.add("flip");

  if (!firstCard) {
    firstCard = this;
    return;
  }

  secondCard = this;
  moves++;
  movesDisplay.textContent = moves;

  checkPair();
}

function checkPair() {
  const isPair = firstCard.dataset.id === secondCard.dataset.id;

  if (isPair) {
    validatePair();
  } else {
    hideCards();
  }
}

function validatePair() {
  firstCard.classList.add("matched");
  secondCard.classList.add("matched");

  firstCard.removeEventListener("click", flipCard);
  secondCard.removeEventListener("click", flipCard);

  pairs++;
  pairsDisplay.textContent = pairs;

  resetTurn();

  if (pairs === IMAGE_BANK.length) {
    clearInterval(timer);
    message.textContent = "Bravo, toutes les paires sont trouvées !";
  }
}

function hideCards() {
  lockBoard = true;

  setTimeout(() => {
    firstCard.classList.remove("flip");
    secondCard.classList.remove("flip");
    resetTurn();
  }, 900);
}

function resetTurn() {
  firstCard = null;
  secondCard = null;
  lockBoard = false;
}

restartBtn.addEventListener("click", initGame);

initGame();
</script>
