<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TP6 - Jeu du Memory</title>
    <style>
        /* --- STYLE DU JEU --- */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }

        .memory-game {
            width: 640px;
            height: 640px;
            display: flex;
            flex-wrap: wrap;
            perspective: 1000px; /* Nécessaire pour l'effet 3D */
        }

        .card {
            width: calc(25% - 10px);
            height: calc(33.333% - 10px);
            margin: 5px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        /* Classe ajoutée en JavaScript lors du clic */
        .card.flip {
            transform: rotateY(180deg);
        }

        .front-face, .back-face {
            width: 100%;
            height: 100%;
            padding: 10px;
            position: absolute;
            border-radius: 5px;
            backface-visibility: hidden; /* Cache le dos quand on voit la face */
            box-sizing: border-box;
        }

        .front-face {
            background: #fff;
            transform: rotateY(180deg); /* L'image est au dos par défaut */
        }

        .back-face {
            background: #2c3e50; /* Couleur de la carte face cachée */
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<header>
    <h1>Jeu du Memory</h1>
    <p>Si les cartes sont différentes, elles restent visibles <strong>20 secondes</strong>.</p>
</header>

<main class="memory-game" id="game-board">
    <div class="card" data-framework="img1"><div class="front-face"><img src="assets/images/img1.png"></div><div class="back-face"></div></div>
    <div class="card" data-framework="img1"><div class="front-face"><img src="assets/images/img1.png"></div><div class="back-face"></div></div>
    
    <div class="card" data-framework="img2"><div class="front-face"><img src="assets/images/img2.png"></div><div class="back-face"></div></div>
    <div class="card" data-framework="img2"><div class="front-face"><img src="assets/images/img2.png"></div><div class="back-face"></div></div>

    <div class="card" data-framework="img3"><div class="front-face"><img src="assets/images/img3.png"></div><div class="back-face"></div></div>
    <div class="card" data-framework="img3"><div class="front-face"><img src="assets/images/img3.png"></div><div class="back-face"></div></div>

    <div class="card" data-framework="img4"><div class="front-face"><img src="assets/images/img4.png"></div><div class="back-face"></div></div>
    <div class="card" data-framework="img4"><div class="front-face"><img src="assets/images/img4.png"></div><div class="back-face"></div></div>

    <div class="card" data-framework="img5"><div class="front-face"><img src="assets/images/img5.png"></div><div class="back-face"></div></div>
    <div class="card" data-framework="img5"><div class="front-face"><img src="assets/images/img5.png"></div><div class="back-face"></div></div>

    </main>

<script>
    const cards = document.querySelectorAll('.card');

    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;

    function flipCard() {
        if (lockBoard) return; // Empêche de cliquer pendant le délai de 20s
        if (this === firstCard) return; // Empêche de double-cliquer sur la même carte

        this.classList.add('flip');

        if (!hasFlippedCard) {
            // Premier clic
            hasFlippedCard = true;
            firstCard = this;
            return;
        }

        // Second clic
        secondCard = this;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;

        if (isMatch) {
            disableCards();
        } else {
            unflipCards();
        }
    }

    function disableCards() {
        // C'est une paire ! On laisse les cartes retournées et on désactive le clic
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;

        // --- LA RÈGLE DES 20 SECONDES ---
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 20000); // 20000ms = 20 secondes
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }

    // Mélange automatique au démarrage
    (function shuffle() {
        cards.forEach(card => {
            let randomPos = Math.floor(Math.random() * 20);
            card.style.order = randomPos;
        });
    })();

    cards.forEach(card => card.addEventListener('click', flipCard));
</script>
</body>
</html>
