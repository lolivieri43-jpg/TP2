<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TP7 - Exercice 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f6f9;
    }

    header {
        background-color: #1e3a8a;
        color: white;
        padding: 20px;
        text-align: center;
    }

    main {
        padding: 40px;
        max-width: 900px;
        margin: auto;
    }

    h2 {
        border-bottom: 2px solid #1e3a8a;
        padding-bottom: 5px;
    }

    .tp-section {
        margin-bottom: 40px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        margin: 10px 0;
    }

    a {
        text-decoration: none;
        color: #1e3a8a;
        font-weight: bold;
    }

    a:hover {
        text-decoration: underline;
    }

    .retour {
        display: inline-block;
        margin-bottom: 20px;
        background: #1e3a8a;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        text-decoration: none;
    }

    footer {
        text-align: center;
        padding: 20px;
        background-color: #1e3a8a;
        color: white;
        margin-top: 40px;
    }
</style>
</head>

<body>
    <p>En haut il y a une balise &lt;head&gt;</p>
    <p>Ensuite nous avons une balise &lt;body&gt; qui contient :</p>
    <nav>
        <ul>
            <li>&lt;div&gt;</li>
            <li>&lt;header&gt;
                <ul>
                    <li>&lt;div&gt;</li>
                    <li>&lt;nav&gt;</li>
                </ul>
            </li>
            <li>&lt;section&gt;
                <ul>
                    <li>&lt;div&gt;</li>
                    <li>&lt;div&gt;</li>
                </ul>
            </li>
            <li>&lt;footer&gt;
                <ul>
                    <li>&lt;div&gt;</li>
                    <li>&lt;ul&gt;</li>
                </ul>
            </li>
            <li>&lt;div&gt;</li>
        </ul>
    </nav>
</body>
</html>
